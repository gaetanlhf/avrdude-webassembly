name: Build and upload artifacts

on:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build via docker compose
        run: |
          mkdir -p output
          docker compose up --build --exit-code-from build build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avrdude-wasm
          path: |
            output/avrdude.js
            output/avrdude.wasm
            output/avrdude.conf
            output/avrdude-worker.js
